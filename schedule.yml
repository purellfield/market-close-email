name: Daily Market Close Email

on:
  schedule:
    - cron: '30 20 * * 1-5'   # 4:30 PM ET (20:30 UTC) every weekday
  workflow_dispatch:            # lets you trigger it manually from GitHub to test

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
run: pip install yfinance resend requests
      - name: Send email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python send_email.py
